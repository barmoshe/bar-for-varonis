name: CI

# Quality gate in front of Vercel's auto-deploy: every push and PR must
# pass eslint (incl. jsx-a11y) and a production build before it lands.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
